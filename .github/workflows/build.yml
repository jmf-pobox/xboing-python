name: Build
on: [push, pull_request]
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.14"

    - name: Install SDL2 dev libraries
      run: sudo apt-get update && sudo apt-get install -y libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev

    - name: Install Hatch
      run: pip install hatch

    - name: Create virtual environment and install all dependencies
      run: hatch env create

    - name: Build package
      run: hatch build

    - name: Check package
      run: hatch run publish:check
