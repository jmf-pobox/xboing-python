name: Tests
on: [push, pull_request]
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install SDL2 dev libraries
      run: sudo apt-get update && sudo apt-get install -y libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev

    - name: Install Hatch
      run: pip install hatch

    - name: Create virtual environment and install all dependencies
      run: hatch env create

    - name: Run tests with coverage
      run: hatch run pytest --cov-report=term-missing --cov=src tests/unit

    - name: Upload coverage to Codecov
      if: matrix.python-version == '3.14'
      uses: codecov/codecov-action@v3
      with:
        fail_ci_if_error: false
